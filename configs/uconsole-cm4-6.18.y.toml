[board]
name = "uconsole-cm4"
family = "raspberrypi"
arch = "arm64"

[paths]
build_dir = "build"
sources_dir = "build/sources"
work_dir = "build/work"
artifacts_dir = "build/artifacts"
logs_dir = "build/logs"

[kernel]
version = "6.18.y"
repo = "https://github.com/raspberrypi/linux.git"
ref = "rpi-6.18.y"
source_dir = "build/sources/kernel/linux"
work_dir = "build/work/kernel/6.18.y/linux"
check_dir = "build/work/kernel/6.18.y/apply-check"
patches_dir = "kernel/6.18.y/patches"
defconfig = "bcm2711_defconfig"
arch = "arm64"
cross_compile = "aarch64-linux-gnu-"
image_path = "arch/arm64/boot/Image"
kernel_image_name = "kernel8.img"
dtb_glob = "arch/arm64/boot/dts/broadcom/*.dtb"
dtbo_glob = "arch/arm64/boot/dts/overlays/*.dtbo"
overlays_readme = "arch/arm64/boot/dts/overlays/README"

[firmware]
repo = "https://github.com/raspberrypi/firmware.git"
ref = "dd28ccd67f16e60f5739dc779060be218b28eb1e"
source_dir = "build/sources/firmware/raspberrypi"
work_dir = "build/work/firmware/uconsole-cm4"
boot_files = [
  "boot/LICENCE.broadcom",
  "boot/bootcode.bin",
  "boot/fixup4.dat",
  "boot/fixup4cd.dat",
  "boot/fixup4db.dat",
  "boot/fixup4x.dat",
  "boot/start4.elf",
  "boot/start4cd.elf",
  "boot/start4db.elf",
  "boot/start4x.elf",
]
config_txt = [
  "arm_64bit=1",
  "kernel=kernel8.img",
  "disable_overscan=1",
  "dtparam=audio=on",
  "[pi4]",
  "max_framebuffers=2",
  "[all]",
  "ignore_lcd=1",
  "dtoverlay=dwc2,dr_mode=host",
  "dtoverlay=vc4-kms-v3d-pi4,cma-384",
  "dtoverlay=clockworkpi-uconsole",
  "dtoverlay=audremap,pins_12_13",
  "dtparam=spi=on",
  "gpio=10=ip,np",
  "dtparam=ant2",
]
cmdline = [
  "rootfstype=ext4",
  "rootwait",
  "fsck.repair=yes",
  "console=serial0,115200",
  "console=tty1",
]

[rootfs]
stage3 = ""
files_dir = "rootfs/files"
work_dir = "build/work/rootfs/uconsole-cm4"

[disk]
partition_table = "gpt"
boot_label = "UCONSOLE"
root_label = "gentoo-root"

[image]
name = "gentoo-uconsole-cm4.img"
size_mib = 8192
boot_size_mib = 512
work_dir = "build/work/image/uconsole-cm4"
compress = true
